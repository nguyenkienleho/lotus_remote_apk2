name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle 8.6
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
        unzip -q gradle-8.6-bin.zip -d /opt/gradle
        echo "/opt/gradle/gradle-8.6/bin" >> $GITHUB_PATH

    - name: Verify Gradle version
      run: gradle --version

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build APK with Gradle 8.6
      run: gradle assembleDebug --no-daemon
      working-directory: .

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lotus-remote-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
